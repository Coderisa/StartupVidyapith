services:
  backend:
    build: ./backend
    container_name: startup-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - NODE_ENV=${NODE_ENV}

    command: node -r crypto server.js

  ml-service:   
    build: ./ml-service
    container_name: startup-ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://backend:5000/api
    container_name: startup-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
      - ml-service